
services:
  postgres:
    image: postgres:17-alpine
    container_name: notiair-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-notiair}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-notiair}
      POSTGRES_DB: ${DB_NAME:-notiair}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data_notiair:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-notiair}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: notiair-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    # volumes:
    #   - redis_data_notiair:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.3.4
    container_name: notiair-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:${REDPANDA_KAFKA_PORT:-19092}
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr redpanda:8082
      - --schema-registry-addr 0.0.0.0:8081
      - --rpc-addr 0.0.0.0:33145
      - --advertise-rpc-addr redpanda:33145
    ports:
      - "${REDPANDA_KAFKA_PORT:-19092}:19092"
      - "${REDPANDA_SCHEMA_REGISTRY_PORT:-8081}:8081"
      - "${REDPANDA_PANDAPROXY_PORT:-8082}:8082"
      - "${REDPANDA_ADMIN_PORT:-9644}:9644"
    volumes:
      - redpanda_data_notiair:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health --exit-when-healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v3.5.0
    container_name: notiair-redpanda-console
    restart: unless-stopped
    ports:
      - "${REDPANDA_CONSOLE_PORT:-8090}:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
      SCHEMA_REGISTRY_ENABLED: "true"
      SCHEMA_REGISTRY_URLS: http://redpanda:8081
    depends_on:
      redpanda:
        condition: service_healthy

volumes:
  postgres_data_notiair:
    driver: local
  redis_data_notiair:
    driver: local
  redpanda_data_notiair:
    driver: local

